# Application
spring.application.name=shopflow-backend

# ==================== H2 avec PERSISTANCE (fichier) ====================
spring.datasource.url=jdbc:h2:file:./data/shopflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==================== H2 Console Configuration ====================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=false

# ==================== JPA ====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ==================== JWT ====================
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ==================== Logging ====================
logging.level.com.shopflow=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG

# ==================== Swagger ====================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.tryItOutEnabled=true

# ==================== Server ====================
server.port=8080
server.error.include-message=always